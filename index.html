<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Accessible Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Responsive Journey</h1>
    </header>

    <main class="grid-container">
        <figure>
            <img src="https://picsum.photos/id/10/400/400" alt="Mountain landscape with a forest and a lake">
            <figcaption>
                <p>Exploring the deep woods teaches us patience and resilience in the face of nature's vastness.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/20/400/400" alt="Close up of a vintage typewriter on a desk">
            <figcaption>
                <p>Writing is a craft that requires discipline and a quiet space to let thoughts flow onto paper.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/30/400/400" alt="Abstract architectural shot of a glass building">
            <figcaption>
                <p>Modern architecture reflects our desire to reach higher and blend light with solid structures.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/40/400/400" alt="Fresh green leaves with water droplets">
            <figcaption>
                <p>Sustainability starts with appreciating the small details in our local ecosystem every day.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/50/400/400" alt="Ocean waves crashing against dark rocks">
            <figcaption>
                <p>The rhythmic sound of the sea provides a natural meditation that clears the mind of stress.</p>
            </figcaption>
        </figure>
    </main>

    <footer>
        <a href="#" id="top-link">Return to Top</a>
    </footer>

</body>
</html>
